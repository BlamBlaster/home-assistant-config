utility_meter:
  hourly_gas:
    source: sensor.gas_meter
    cycle: hourly
  weekly_gas:
    source: sensor.gas_meter
    cycle: weekly
  daily_gas:
    source: sensor.gas_meter
    cycle: daily
  monthly_gas:
    source: sensor.gas_meter
    cycle: monthly

  hourly_water:
    source: sensor.water_meter
    cycle: hourly
  weekly_water:
    source: sensor.water_meter
    cycle: weekly
  daily_water:
    source: sensor.water_meter
    cycle: daily
  monthly_water:
    source: sensor.water_meter
    cycle: monthly