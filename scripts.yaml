cycle_bedroom_fan_speed:
  alias: Cycle Bedroom Fan Speed
  mode: single
  sequence:
  - variables:
      index: '{{ states(''input_number.fan_speed_index'') | int(0) }}'
      descending: '{{ is_state(''input_boolean.fan_descending'', ''on'') }}'
      speed_steps:
      - 0
      - 16
      - 33
      - 50
      - 66
      - 83
      - 100
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ index == 0 }}'
      sequence:
      - target:
          entity_id: fan.bedroom_fan
        action: fan.turn_on
      - data:
          percentage: 16
        target:
          entity_id: fan.bedroom_fan
        action: fan.set_percentage
      - data:
          entity_id: input_number.fan_speed_index
          value: 1
        action: input_number.set_value
      - target:
          entity_id: input_boolean.fan_descending
        action: input_boolean.turn_off
    - conditions:
      - condition: template
        value_template: '{{ not descending and index > 0 and index < 6 }}'
      sequence:
      - data:
          percentage: '{{ speed_steps[index + 1] }}'
        target:
          entity_id: fan.bedroom_fan
        action: fan.set_percentage
      - data:
          entity_id: input_number.fan_speed_index
          value: '{{ index + 1 }}'
        action: input_number.set_value
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ index + 1 == 6 }}'
          sequence:
          - target:
              entity_id: input_boolean.fan_descending
            action: input_boolean.turn_on
    - conditions:
      - condition: template
        value_template: '{{ descending and index > 1 }}'
      sequence:
      - data:
          percentage: '{{ speed_steps[index - 1] }}'
        target:
          entity_id: fan.bedroom_fan
        action: fan.set_percentage
      - data:
          entity_id: input_number.fan_speed_index
          value: '{{ index - 1 }}'
        action: input_number.set_value
    - conditions:
      - condition: template
        value_template: '{{ descending and index == 1 }}'
      sequence:
      - target:
          entity_id: fan.bedroom_fan
        action: fan.turn_off
      - data:
          entity_id: input_number.fan_speed_index
          value: 0
        action: input_number.set_value
      - target:
          entity_id: input_boolean.fan_descending
        action: input_boolean.turn_off
cycle_bedside_rainbow:
  alias: Cycle Bedside Rainbow
  mode: single
  sequence:
  - variables:
      index: '{{ states(''input_number.bedside_rainbow_index'') | int }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ index == 0 }}'
      sequence:
      - service: input_text.set_value
        target:
          entity_id: input_text.bedside_original_color
        data:
          value: '{{ state_attr(''light.bedside_rgb_ben'',''hs_color'') | join('','')
            }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ index < 12 }}'
      sequence:
      - service: light.turn_on
        target:
          entity_id: light.bedside_rgb_ben
        data:
          hs_color:
          - '{{ (index * 30) % 360 }}'
          - 100
      - service: input_number.set_value
        target:
          entity_id: input_number.bedside_rainbow_index
        data:
          value: '{{ index + 1 }}'
    - conditions:
      - condition: template
        value_template: '{{ index >= 12 }}'
      sequence:
      - variables:
          parts: '{{ states(''input_text.bedside_original_color'').split('','') }}'
      - service: light.turn_on
        target:
          entity_id: light.bedside_rgb_ben
        data:
          hs_color:
          - '{{ parts[0]|float }}'
          - '{{ parts[1]|float }}'
      - service: input_number.set_value
        target:
          entity_id: input_number.bedside_rainbow_index
        data:
          value: 0
