template:
  - sensor:
      - name: "Lamp Post Brightness"
        unique_id: lamp_post_brightness
        unit_of_measurement: "%"
        state: >
          {% set hour = now().hour %}
          {% if 17 <= hour < 19 %}
            255
          {% elif 19 <= hour < 21 %}
            200
          {% elif 21 <= hour < 23 %}
            150
          {% else %}
            100
          {% endif %}

      - name: "Lamp Post Color Temperature"
        unique_id: lamp_post_color_temperature
        unit_of_measurement: "K"
        state: >
          {% set hour = now().hour %}
          {% if 17 <= hour < 19 %}
            4000
          {% elif 19 <= hour < 21 %}
            3500
          {% elif 21 <= hour < 23 %}
            3000
          {% else %}
            2700
          {% endif %}

      - name: "Bedroom Fan Speed Percent"
        unique_id: bedroom_fan_speed_percent
        unit_of_measurement: "%"
        state: "{{ state_attr('fan.bedroom_fan', 'percentage') | int(0) }}"

mqtt:
  sensor:
    - name: "Gas Meter"
      state_topic: "rtlamr/110509266/state"
      value_template: "{{ value_json.reading | float(0) }}"
      unit_of_measurement: "ft³"
      device_class: gas
      state_class: total_increasing
      availability:
        - topic: "rtlamr/status"
          payload_available: "online"
          payload_not_available: "offline"
      json_attributes_topic: "rtlamr/110509266/attributes"

    - name: "Water Meter"
      state_topic: "rtlamr/1548154572/state"
      value_template: "{{ value_json.reading | float(0) }}"
      unit_of_measurement: "gal"
      device_class: water
      state_class: total_increasing
      availability:
        - topic: "rtlamr/status"
          payload_available: "online"
          payload_not_available: "offline"
      json_attributes_topic: "rtlamr/1548154572/attributes"

input_number:
  bedside_rainbow_index:
    name: Bedside Rainbow Index
    min: 0
    max: 13
    step: 1
    initial: 0

input_text:
  bedside_original_color:
    name: Bedside Original Color
    max: 40

notify:
  - platform: group
    name: family_phones
    services:
      - service: mobile_app_benjamins_iphone_16_pro
      - service: mobile_app_amandas_iphone_14

# FIXED: entity_id must be a string (not a list) for alert integration.
# FIXED: repeat value of 0 is invalid (minimum is 0.016 minutes ~= 1 second).
# Each door now has its own alert entry.
alert:
  front_door_left_open:
    name: Front Door Left Open
    entity_id: binary_sensor.front_door_contact
    state: 'on'
    repeat:
      - 1
      - 5
      - 15
    can_acknowledge: true
    skip_first: false
    notifiers:
      - family_phones

  basement_door_left_open:
    name: Basement Door Left Open
    entity_id: binary_sensor.basement_door_contact
    state: 'on'
    repeat:
      - 1
      - 5
      - 15
    can_acknowledge: true
    skip_first: false
    notifiers:
      - family_phones