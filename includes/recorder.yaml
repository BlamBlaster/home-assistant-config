purge_keep_days: 60  # how many days to keep history
commit_interval: 30  # seconds between DB writes
exclude:
  domains:
    - automation
    - script
    - updater
  entities:
    - sensor.time
    - sensor.date
include:
  entities:
    - sensor.sensor_nursery_temperature
    - sensor.nursery_temp_range
