  - service: light.turn_off
    target:
      entity_id: all
  - service: climate.set_hvac_mode
    target:
      entity_id:
      - climate.upstairs_thermostat
      - climate.downstairs_2
    data:
      hvac_mode: 'off'
  - service: notify.mobile_app_benjamins_iphone_16
    data:
      message: Away mode activated. Home secured.
  - service: notify.mobile_app_iphone_14
    data:
      message: Away mode activated. Home secured.
  mode: single
