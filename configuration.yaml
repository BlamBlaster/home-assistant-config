utility_meter:
  hourly_gas:
    source: sensor.gas_meter
    cycle: hourly
  weekly_gas:
    source: sensor.gas_meter
    cycle: hourly
  daily_gas:
    source: sensor.gas_meter
    cycle: daily
  monthly_gas:
    source: sensor.gas_meter
    cycle: monthly

  hourly_water:
    source: sensor.water_meter
    cycle: hourly
  weekly_water:
    source: sensor.water_meter
    cycle: weekly
  daily_water:
    source: sensor.water_meter
    cycle: daily
  monthly_water:
    source: sensor.water_meter
    cycle: monthly


camera:
  platform: ffmpeg
  name: reolink E1 pro
  input: rtsp://admin:DDiue$g6T8h*$$5k84Nx@192.168.20.208:554

template:
  - sensor:
      - name: "Lamp Post Brightness"
        state: >
          {% set hour = now().hour %}
          {% if 17 <= hour < 19 %}
            255
          {% elif 19 <= hour < 21 %}
            200
          {% elif 21 <= hour < 23 %}
            150
          {% else %}
            100
          {% endif %}

      - name: "Lamp Post Color Temperature"
        state: >
          {% set hour = now().hour %}
          {% if 17 <= hour < 19 %}
            4000
          {% elif 19 <= hour < 21 %}
            3500
          {% elif 21 <= hour < 23 %}
            3000
          {% else %}
            2700
          {% endif %}


template:
  - sensor:
      - name: "Bedroom Fan Speed Percent"
        state: "{{ state_attr('fan.bedroom_fan', 'percentage') | default(0) }}"

