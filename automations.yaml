        data: {}
        action: light.turn_off
  mode: restart
- id: '1702994787994'
  alias: Notification or Lock Doors
  description: ''
  triggers:
  - seconds: /15
    trigger: time_pattern
  conditions: []
  actions:
  - alias: Lock Basement after 30s at Night
    if:
    - alias: Lock Closed Door after Sunset
      condition: and
      conditions:
      - condition: state
        state: unlocked
        entity_id: lock.basement_door_lock
      - condition: state
        state: 'off'
        entity_id: binary_sensor.basement_door_contact
      - condition: sun
        before: sunrise
        after: sunset
    then:
    - delay:
        hours: 0
        minutes: 0
        seconds: 30
        milliseconds: 0
      - data:
          code: '27514760'
        target:
          entity_id: lock.basement_door_lock
        action: lock.lock
      - action: notify.mobile_app_benjamins_iphone_16
        data:
          message: Basement door locked
      - action: notify.mobile_app_iphone_14
        data:
          message: Basement door locked
      else:
      - alias: Lock Basement after 3m during Day
        if:
        - condition: and
          conditions:
        - condition: state
          state: unlocked
          entity_id: lock.basement_door_lock
        - condition: state
          state: 'off'
          entity_id: binary_sensor.basement_door_contact
        - condition: sun
          before: sunset
          after: sunrise
      then:
      - delay:
          hours: 0
          minutes: 3
          seconds: 0
          milliseconds: 0
      - data:
          code: '27514760'
        target:
          entity_id: lock.basement_door_lock
        action: lock.lock
      - action: notify.mobile_app_benjamins_iphone_16
        data:
          message: Basement door locked
      - action: notify.mobile_app_iphone_14
        data:
          message: Basement door locked
      enabled: true
      else:
      - if:
        - condition: and
          conditions:
          - condition: state
            state: unlocked
            entity_id: lock.basement_door_lock
            for:
              hours: 0
              minutes: 5
              seconds: 0
          - condition: or
            conditions:
            - condition: state
              state: 'on'
              entity_id: binary_sensor.basement_door_contact
            - condition: state
              state: unavailable
              entity_id: binary_sensor.basement_door_contact
            - condition: state
              entity_id: binary_sensor.basement_door_contact
              state: unavailable
        then:
        - metadata: {}
          data:
            title: ' ! ! Basement door is Jammed ! ! '
            message: The basement door was unable to be {% if is_state('lock.basement_door_lock',
              'jammed') %}locked{% else %}closed{% endif %}! Please close and lock
              the door.
            data:
