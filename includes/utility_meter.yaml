# includes/utility_meter.yaml

# --- GAS ---
gas_hourly:
  source: sensor.gas_meter
  cycle: hourly
  name: Gas – This Hour
  unique_id: utility_gas_hourly
  periodically_resetting: false

gas_daily:
  source: sensor.gas_meter
  cycle: daily
  name: Gas – Today
  unique_id: utility_gas_daily
  periodically_resetting: false

gas_weekly:
  source: sensor.gas_meter
  cycle: weekly
  name: Gas – This Week
  unique_id: utility_gas_weekly
  periodically_resetting: false

gas_monthly:
  source: sensor.gas_meter
  cycle: monthly
  name: Gas – This Month
  unique_id: utility_gas_monthly
  periodically_resetting: false

