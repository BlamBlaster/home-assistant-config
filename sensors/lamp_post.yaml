# sensors/lamp_post.yaml

- sensor:
    - name: Lamp Post Brightness
      unique_id: lamp_post_brightness
      unit_of_measurement: "%"
      state: >
        {% set hour = now().hour %}
        {% if hour < 18 %}
          255
        {% elif hour < 21 %}
          200
        {% elif hour < 23 %}
          150
        {% else %}
          100
        {% endif %}

    - name: Lamp Post Color Temperature
      unique_id: lamp_post_color_temperature
      unit_of_measurement: "mired"
      state: >
        {% set hour = now().hour %}
        {% if hour < 18 %}
          200
        {% elif hour < 21 %}
          250
        {% elif hour < 23 %}
          300
        {% else %}
          370
        {% endif %}

        