- id: '1746975077666'
  alias: Smart Fan Adjustment
  description: This automation turns on room fans and adjusts their speed based on
    how hot each room is compared to your set temperature. It only works if a window
    or door in the room is open and fan automation is enabled. If the room is cooler
    than the setpoint, it turns the fan off.
  triggers:
  - entity_id:
    - binary_sensor.office_front_contact
    - binary_sensor.office_side_contact
    - binary_sensor.nursery_rear_contact
    - binary_sensor.nursery_side_contact
    - binary_sensor.master_bedroom_left_contact
    - binary_sensor.master_bedroom_side_contact
    - binary_sensor.master_bedroom_right_contact
    - binary_sensor.den_left_contact
    - binary_sensor.den_right_contact
    trigger: state
  - entity_id:
    - sensor.office_multi_sensor_temperature
    - sensor.sensor_nursery_temperature
    - sensor.sensor_master_bedroom_temperature
    - sensor.familyroom_temperature
    trigger: state
  conditions:
  - condition: state
    entity_id: input_boolean.fan_auto_enabled
    state: 'on'
  actions:
  - repeat:
      for_each: '{{ fan_targets }}'
      sequence:
      - variables:
          room: '{{ repeat.item.room }}'
          current: '{{ repeat.item.temp }}'
          fan_entity: '{{ repeat.item.fan }}'
          contact_open: '{{ repeat.item.contact_open }}'
          temp_diff: '{{ current - setpoint }}'
          target_pct: '{% if temp_diff < -2 %} 0 {% elif temp_diff < 0 %} 16 {% elif
            temp_diff < 2 %} 33 {% elif temp_diff < 4 %} 50 {% elif temp_diff < 6
            %} 75 {% else %} 100 {% endif %}'
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ contact_open and target_pct > 0 }}'
          sequence:
          - data:
              entity_id: '{{ fan_entity }}'
              percentage: '{{ target_pct }}'
            action: fan.set_percentage
        - conditions:
          - condition: template
            value_template: '{{ contact_open and target_pct == 0 }}'
          sequence:
          - data:
              entity_id: '{{ fan_entity }}'
            action: fan.turn_off
  variables:
    setpoint: '{{ states(''input_number.previous_hvac_temp_upstairs'') | float(default=72)
      }}'
    fan_targets: "{{\n  [\n    {'room': 'office', 'temp': states('sensor.office_multi_sensor_temperature')\n
      \     | float(default=72),\n     'contact_open': (is_state('binary_sensor.office_front_contact',\n
      \     'on') or\n                      is_state('binary_sensor.office_side_contact',\n
      \     'on')),\n     'fan': 'fan.office_fan'},\n    {'room': 'nursery', 'temp':
      states('sensor.sensor_nursery_temperature')\n      | float(default=72),\n     'contact_open':
      (is_state('binary_sensor.nursery_rear_contact',\n      'on') or\n                      is_state('binary_sensor.nursery_side_contact',\n
      \     'on')),\n     'fan': 'fan.nursery_fan'},\n    {'room': 'bedroom', 'temp':
      states('sensor.sensor_master_bedroom_temperature')\n      | float(default=72),\n
      \    'contact_open': (is_state('binary_sensor.master_bedroom_left_contact',\n
      \     'on') or\n                      is_state('binary_sensor.master_bedroom_side_contact',\n
      \     'on') or\n                      is_state('binary_sensor.master_bedroom_right_contact',\n
      \     'on')),\n     'fan': 'fan.bedroom_fan'},\n    {'room': 'den', 'temp':
      states('sensor.familyroom_temperature')\n      | float(default=72),\n     'contact_open':
      (is_state('binary_sensor.den_left_contact',\n      'on') or\n                      is_state('binary_sensor.den_right_contact',\n
      \     'on')),\n     'fan': 'fan.den_fan'}\n  ]\n}}\n"
  mode: queued
- id: '1746983951987'
  alias: HVAC Pause Control
  description: ''
