      sequence:
      - data:
          brightness_pct: 100
        action: light.turn_on
        target:
          entity_id: light.dining_room_lamp
    - conditions:
      - condition: trigger
        id:
        - Motion Clear
        - Camera Clear
      sequence:
      - delay:
          hours: 0
          minutes: 5
          seconds: 0
          milliseconds: 0
