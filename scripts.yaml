cycle_bedroom_fan_speed:
  alias: Cycle Bedroom Fan Speed
  mode: single
  sequence:
  - variables:
      index: '{{ states(''input_number.fan_speed_index'') | int(0) }}'
      descending: '{{ is_state(''input_boolean.fan_descending'', ''on'') }}'
      speed_steps:
      - 0
      - 16
      - 33
      - 50
      - 66
      - 83
      - 100
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ index == 0 }}'
      sequence:
      - target:
          entity_id: fan.bedroom_fan
        action: fan.turn_on
      - data:
          percentage: 16
        target:
          entity_id: fan.bedroom_fan
        action: fan.set_percentage
      - data:
          entity_id: input_number.fan_speed_index
          value: 1
        action: input_number.set_value
      - target:
          entity_id: input_boolean.fan_descending
        action: input_boolean.turn_off
    - conditions:
      - condition: template
        value_template: '{{ not descending and index > 0 and index < 6 }}'
      sequence:
      - data:
          percentage: '{{ speed_steps[index + 1] }}'
        target:
          entity_id: fan.bedroom_fan
        action: fan.set_percentage
      - data:
          entity_id: input_number.fan_speed_index
          value: '{{ index + 1 }}'
        action: input_number.set_value
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ index + 1 == 6 }}'
          sequence:
          - target:
              entity_id: input_boolean.fan_descending
            action: input_boolean.turn_on
    - conditions:
      - condition: template
        value_template: '{{ descending and index > 1 }}'
      sequence:
      - data:
          percentage: '{{ speed_steps[index - 1] }}'
        target:
          entity_id: fan.bedroom_fan
        action: fan.set_percentage
      - data:
          entity_id: input_number.fan_speed_index
          value: '{{ index - 1 }}'
        action: input_number.set_value
    - conditions:
      - condition: template
        value_template: '{{ descending and index == 1 }}'
      sequence:
      - target:
          entity_id: fan.bedroom_fan
        action: fan.turn_off
      - data:
          entity_id: input_number.fan_speed_index
          value: 0
        action: input_number.set_value
      - target:
          entity_id: input_boolean.fan_descending
        action: input_boolean.turn_off
cycle_bedside_lamp_colors:
  alias: Cycle Bedside Lamp Colors
  mode: single
  sequence:
  - variables:
      colors:
      - [255, 0, 0]
      - [255, 165, 0]
      - [255, 255, 0]
      - [0, 255, 0]
      - [0, 0, 255]
      - [75, 0, 130]
      - [238, 130, 238]
      - [255, 255, 255]
      - [0, 255, 255]
      - [255, 0, 255]
      - [255, 192, 203]
      - [255, 105, 180]
      - [255, 215, 0]
  - repeat:
      for_each: "{{ colors }}"
      sequence:
      - service: light.turn_on
        target:
          entity_id:
          - light.bedside_rgb_amanda
          - light.bedside_rgb_ben
        data:
          rgb_color:
            - "{{ repeat.item[0] | int }}"
            - "{{ repeat.item[1] | int }}"
            - "{{ repeat.item[2] | int }}"
          transition: 1
      - delay:
          seconds: 1
