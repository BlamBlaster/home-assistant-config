- id: '1679622108762'
  alias: 'Washer or Dryer Completed '
  description: ''
  triggers:
  - type: turned_on
    device_id: 25bcc23515f0cf961630a8ed41e66f6a
    entity_id: binary_sensor.front_load_washer_wash_completed
    domain: binary_sensor
    trigger: device
    id: Washer
  - type: turned_on
    device_id: 92287c979ec8b7923f2716e8244063a2
    entity_id: binary_sensor.dryer_dry_completed
    domain: binary_sensor
    trigger: device
    id: Dryer
  conditions: []
  actions:
  - if:
    - condition: trigger
      id:
      - Washer
    - type: is_on
      condition: device
      device_id: 92287c979ec8b7923f2716e8244063a2
      entity_id: ea38ecbdb9d967e844c729ca94f3f1df
      domain: binary_sensor
    then:
    - data:
        cache: false
        entity_id: media_player.living_room_speaker
        message: Washer has finished and the dryer is completed.
      action: tts.google_translate_say
  - if:
    - condition: trigger
      id:
      - Washer
    - type: is_off
      condition: device
      device_id: 92287c979ec8b7923f2716e8244063a2
      entity_id: ea38ecbdb9d967e844c729ca94f3f1df
      domain: binary_sensor
    then:
    - data:
        cache: false
        entity_id: media_player.living_room_speaker
        message: Washer has finished but the dryer is still running
      action: tts.google_translate_say
  - if:
    - condition: trigger
      id:
      - Dryer
    then:
    - data:
        cache: false
        entity_id: media_player.living_room_speaker
        message: 'The dryer has finished. '
      action: tts.google_translate_say
  mode: single
